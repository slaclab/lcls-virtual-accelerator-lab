app = "lcls-lab"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-4x"
  memory = "4gb"

[checks]
  [checks.health]
    type = "http"
    port = 8000
    path = "/api/config"
    interval = "30s"
    timeout = "5s"
    grace_period = "120s"