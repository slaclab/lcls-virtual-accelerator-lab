# VM deployment: 6 isolated containers (one per group) + nginx router.
# Usage: docker compose up -d
# Students access: http://<server-ip>/g1/ through /g6/
services:
  g1:
    image: ghcr.io/slaclab/lcls-surrogate-lab:latest
    restart: unless-stopped
    mem_limit: 3g

  g2:
    image: ghcr.io/slaclab/lcls-surrogate-lab:latest
    restart: unless-stopped
    mem_limit: 3g

  g3:
    image: ghcr.io/slaclab/lcls-surrogate-lab:latest
    restart: unless-stopped
    mem_limit: 3g

  g4:
    image: ghcr.io/slaclab/lcls-surrogate-lab:latest
    restart: unless-stopped
    mem_limit: 3g

  g5:
    image: ghcr.io/slaclab/lcls-surrogate-lab:latest
    restart: unless-stopped
    mem_limit: 3g

  g6:
    image: ghcr.io/slaclab/lcls-surrogate-lab:latest
    restart: unless-stopped
    mem_limit: 3g

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - g1
      - g2
      - g3
      - g4
      - g5
      - g6
    restart: unless-stopped
