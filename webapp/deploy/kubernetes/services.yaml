# ---------------------------------------------------------------------------
# Per-pod Services — one for each StatefulSet ordinal.
# Used by Ingress to route /ai-lab/gN directly to the corresponding worker.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: lcls-lab-g1
  namespace: lcls-surrogate-lab
spec:
  selector:
    statefulset.kubernetes.io/pod-name: lcls-lab-worker-0
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
